<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Demos interactivas de Inteligencia Artificial aplicada a negocios reales. Prueba asistentes de voz, bots de WhatsApp y CRM documental en Sevilla." />
    <meta name="keywords" content="inteligencia artificial, IA, automatización, Sevilla, demos, asistente voz, WhatsApp bot, CRM" />
    <meta name="author" content="DemosInteligenciaSevilla" />
    <meta name="theme-color" content="#0a0a0a" />
    
    <!-- Open Graph -->
    <meta property="og:title" content="DemosInteligenciaSevilla - IA aplicada a tu negocio" />
    <meta property="og:description" content="Prueba en vivo cómo la inteligencia artificial puede automatizar tu negocio. Demos interactivas de voz, WhatsApp y CRM." />
    <meta property="og:type" content="website" />
    
    <!-- Preconnect to Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <title>DemosInteligenciaSevilla | IA aplicada a tu negocio</title>
    
    <style>
      /* Critical CSS for initial load */
      body {
        margin: 0;
        padding: 0;
        background-color: #0a0a0a;
        color: #ffffff;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      }
      
      #root {
        min-height: 100vh;
      }
      
      /* Loading state */
      .loading {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0a0a0a;
        z-index: 9999;
      }
      
      .loading-spinner {
        width: 40px;
        height: 40px;
        border: 3px solid #27272a;
        border-top-color: #e11d48;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="loading">
        <div class="loading-spinner"></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
